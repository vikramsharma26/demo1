<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal xxxxx</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>

<body class="container-fluid p-4">

    <div>
        Missed calls
        <span class="fa fa-phone"></span>
        <sup>
            <span class="badge rounded-pill bg-danger">1</span>
        </sup>
    </div>

    <div class="mt-3">
        Messages
        <span class="fa fa-envelope"></span>
        <sup>
            <span class="badge rounded-pill bg-primary">1</span> 
        </sup>
    </div>

    <h2 class="mt-4">Badge inside Button</h2>

    <button class="btn btn-outline-success">
        <span class="badge bg-success">4</span>
        <span class="fa fa-thumbs-up"></span>
        Likes
    </button>

    <h2 class="mt-4">Badge for List</h2>

    <ul class="list-unstyled">
        <li class="mb-2">
            <span class="badge bg-primary rounded-circle">4</span>
            Electronics
        </li>

        <li class="mb-2">
            <span class="badge bg-primary rounded-circle">3</span>
            Footwear
        </li>

     
    </ul>

    <h2 class="mt-4">Badge Pills</h2>

    <ul class="d-flex gap-3 list-unstyled">
        <li>
            <span class="badge bg-primary rounded-pill">Home</span>
        </li>

        <li>
            <span class="badge bg-danger rounded-pill">About</span>
        </li>

        <li>
            <span class="badge bg-success rounded-pill">Contact</span>
        </li>
    </ul>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
